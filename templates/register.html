{% extends 'base.html' %}
{% block content %}
<h2>Înregistrare</h2>
<form method="POST">
    <label>Nume:</label>
    <input type="text" name="name" required>
    <label>Email:</label>
    <input type="email" name="email" required>
    <label>Parolă:</label>
    <input type="password" name="password" required>
    <button type="submit">Înregistrează-te</button>
</form>
{% endblock %}
