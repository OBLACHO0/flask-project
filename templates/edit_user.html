{% extends 'base.html' %}
{% block content %}
<h2>Editează utilizatorul</h2>
<form method="POST">
    <label>Nume:</label>
    <input type="text" name="name" value="{{ user.name }}" required>
    <label>Email:</label>
    <input type="email" name="email" value="{{ user.email }}" required>
    <button type="submit">Salvează</button>
</form>
{% endblock %}
