<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Flask + SQLAlchemy</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        nav a { margin-right: 15px; text-decoration: none; color: #0066cc; }
        .flash-success { background: #d4edda; padding: 10px; border-radius: 5px; color: #155724; }
        .flash-danger  { background: #f8d7da; padding: 10px; border-radius: 5px; color: #721c24; }
        .flash-info    { background: #d1ecf1; padding: 10px; border-radius: 5px; color: #0c5460; }
        .flash-warning { background: #fff3cd; padding: 10px; border-radius: 5px; color: #856404; }
        input, textarea { width: 100%; padding: 8px; margin: 5px 0 15px 0; box-sizing: border-box; }
        button { background: #0066cc; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f2f2f2; }
        a.btn { background: #28a745; color: white; padding: 5px 10px; text-decoration: none; border-radius: 3px; margin-right: 5px; }
        a.btn-danger { background: #dc3545; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/register">Înregistrare</a>
        <a href="/login">Login</a>
        <a href="/users">Toți utilizatorii</a>
        <a href="/search">Căutare</a>
        <a href="/add_amount">💰 Введите сумму</a>
        <a href="/leaderboard">🏆 Лидерборд</a>
        <a href="/logout">Logout</a>
    </nav>
    <hr>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="flash-{{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
</body>
</html>
